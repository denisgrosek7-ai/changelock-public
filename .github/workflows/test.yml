name: test
on:
  pull_request:
  push:
    branches: [main]
jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Run Go tests
        run: go test ./...

  ui-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install UI dependencies
        working-directory: ui
        run: npm ci
      - name: Build UI
        working-directory: ui
        run: npm run build
