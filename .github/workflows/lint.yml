name: lint
on:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Check Go formatting
        run: test -z "$(git ls-files '*.go' | xargs gofmt -l)"
