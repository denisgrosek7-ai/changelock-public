# Enterprise baseline example.
# Do not use demo tokens or docker-compose.dev.yml defaults with this file.
# `releaseProfile=production` is accepted as a compatibility alias for these
# enterprise guardrails, but production is not a fourth package/tier.
deploymentProfile: enterprise

auth:
  mode: oidc-jwt
  createSecret: false
  # Secret must provide CHANGELOCK_INTERNAL_SERVICE_TOKEN.
  existingSecret: changelock-auth
  roleClaim: groups
  tenantClaim: tenant_id
  emailClaim: email
  subjectClaim: sub
  requireTenantScope: true
  allowGlobalSecurityAdmin: true
  roleBindingsJson: '{"viewer":["changelock-viewers"],"operator":["changelock-operators"],"security_admin":["changelock-security-admins"],"service_internal":["changelock-services"]}'
  oidc:
    issuer: https://issuer.example.com
    audiences: changelock-ui
    jwksUrl: https://issuer.example.com/.well-known/jwks.json
    clockSkew: 1m

sync:
  mode: hub
  requireClusterId: true
  failMode: last-known-good
  pollInterval: 30s
  cacheDir: /var/lib/changelock-sync
  # Secret must provide CHANGELOCK_SYNC_CLUSTER_BINDINGS_JSON for hub mode.
  clusterBindingsExistingSecret: changelock-sync
  clusterBindingsKey: CHANGELOCK_SYNC_CLUSTER_BINDINGS_JSON
  # Spoke example:
  # mode: spoke
  # clusterId: enterprise-eu
  # hubUrl: https://changelock-hub.example.com
  # tokenExistingSecret: changelock-sync
  # tokenKey: CHANGELOCK_SYNC_TOKEN

signer:
  mode: vault-transit
  purposes: exceptions,sync-snapshots
  keyId: changelock-control-plane
  algorithm: sha2-256
  verifyOnRead: true
  # Secret must provide CHANGELOCK_VAULT_TOKEN.
  existingSecret: changelock-signer
  vault:
    addr: https://vault.example.com
    transitPath: transit
    transitKey: changelock-control-plane

signingIdentity:
  # Start in monitor mode for the first rollout. Move to enforce only after the
  # expected signer policies and workflow path inputs are verified in-cluster.
  enforcement: monitor
  requireRekor: true
  quarantineOnDrift: false
  # Optional repository-local workflow scan path if the audit-writer deployment mounts CI workflow definitions.
  workflowsDir: .github/workflows

postgresql:
  enabled: false

externalPostgresql:
  existingSecret: changelock-postgres

auditWriter:
  image:
    repository: ghcr.io/denisgrosek7-ai/changelock-audit-writer@sha256:1111111111111111111111111111111111111111111111111111111111111111
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  antiAffinity: required
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    CHANGELOCK_REPORTS_TIMEOUT: 5s
    CHANGELOCK_SBOM_INGEST_ENABLED: "true"
    CHANGELOCK_VULNOPS_ENABLED: "true"
    CHANGELOCK_VULNOPS_SCAN_INTERVAL: 6h
    CHANGELOCK_VULNOPS_SCANNER: trivy
    CHANGELOCK_VULNOPS_TRIVY_PATH: trivy
    CHANGELOCK_VULNOPS_GRYPE_PATH: grype
    CHANGELOCK_CORS_ALLOW_ORIGINS: https://changelock.example.com
    # Internal auditor-facing preview only. Leave disabled unless you explicitly
    # want sanitized public-trust preview/export artifacts derived from 8k.
    CHANGELOCK_TRUST_PUBLICATION_MODE: preview
    CHANGELOCK_HARDENING_REVIEW_ENABLED: "true"
    CHANGELOCK_HARDENING_REVIEW_STALE_EXCEPTION_DAYS: "14"
    CHANGELOCK_SCORECARD_EVENT_LIMIT: "250"
    CHANGELOCK_SCORECARD_SEVERITY_THRESHOLD: HIGH
    # Keep advisory AI guidance disabled until prompt context boundaries and
    # redaction posture are explicitly reviewed for the target environment.
    CHANGELOCK_AI_GUIDANCE_MODE: disabled
    CHANGELOCK_AI_GUIDANCE_MAX_ITEMS: "12"
    CHANGELOCK_AI_GUIDANCE_INCLUDE_DOC_LINKS: "true"
    CHANGELOCK_AI_GUIDANCE_REDACT_SENSITIVE: "true"

policyEngine:
  image:
    repository: ghcr.io/denisgrosek7-ai/changelock-policy-engine@sha256:2222222222222222222222222222222222222222222222222222222222222222
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  antiAffinity: required
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

attestationVerifier:
  image:
    repository: ghcr.io/denisgrosek7-ai/changelock-attestation-verifier@sha256:3333333333333333333333333333333333333333333333333333333333333333
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  antiAffinity: soft
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

deployGate:
  image:
    repository: ghcr.io/denisgrosek7-ai/changelock-deploy-gate@sha256:4444444444444444444444444444444444444444444444444444444444444444
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 3
  antiAffinity: required
  # Optional: set to enforce once VEX-aware vulnerability evaluation is part of the admission posture.
  vexDeployMode: disabled
  tls:
    enabled: true
    secretName: changelock-deploy-gate-tls
  webhook:
    enabled: true
    caBundle: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCg==
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  service:
    port: 443
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

runtimeAgent:
  image:
    repository: ghcr.io/denisgrosek7-ai/changelock-runtime-agent@sha256:5555555555555555555555555555555555555555555555555555555555555555
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  selfHealing:
    mode: alert-only
    maxAttempts: 3
    window: 15m
    allowedKinds: Deployment,DaemonSet,StatefulSet
    requireSignedDesiredState: true
    criticalOnly: false
  closedLoop:
    reconcileInterval: 2m
    failMode: quarantine
    verifyDesiredStateOnReconcile: true
    protectedNamespaces: changelock,changelock-system
    protectedWorkloads: ""
    quarantineNetworkPolicyEnabled: false
    vexQuarantine:
      enabled: false
      severity: critical
      requireNetActionable: true

ui:
  enabled: false

networkPolicy:
  enabled: true
