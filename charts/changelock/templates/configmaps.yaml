apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "changelock.fullname" . }}-policies-global
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
data:
  artifact-policy.yaml: |
{{ .Files.Get "files/policies/global/artifact-policy.yaml" | indent 4 }}
  change-policy.yaml: |
{{ .Files.Get "files/policies/global/change-policy.yaml" | indent 4 }}
  runtime-policy.yaml: |
{{ .Files.Get "files/policies/global/runtime-policy.yaml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "changelock.fullname" . }}-policies-acme
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
data:
  tenant.yaml: |
{{ .Files.Get "files/policies/tenants/acme/tenant.yaml" | indent 4 }}
  environments.yaml: |
{{ .Files.Get "files/policies/tenants/acme/environments.yaml" | indent 4 }}
  repositories.yaml: |
{{ .Files.Get "files/policies/tenants/acme/repositories.yaml" | indent 4 }}
  critical-paths.yaml: |
{{ .Files.Get "files/policies/tenants/acme/critical-paths.yaml" | indent 4 }}
{{- if .Values.ui.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "ui-config") }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
data:
  config.js: |
    window.__CHANGELOCK_CONFIG__ = {
      apiBaseUrl: {{ .Values.ui.runtimeConfig.apiBaseUrl | quote }},
      apiToken: {{ .Values.ui.runtimeConfig.apiToken | quote }},
      apiTimeoutMs: {{ .Values.ui.runtimeConfig.apiTimeoutMs | quote }}
    };
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location = /config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store";
      }

      location /api/ {
        proxy_pass http://{{ include "changelock.componentFullname" (dict "root" . "component" "audit-writer") }}:{{ .Values.auditWriter.service.port }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
{{- end }}

