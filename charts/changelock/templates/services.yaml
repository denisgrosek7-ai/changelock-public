{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "changelock.fullname" . }}-postgresql
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  selector:
    {{- include "changelock.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgres
---
{{- end }}
{{- if .Values.auditWriter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "audit-writer") }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
    app.kubernetes.io/component: audit-writer
spec:
  selector:
    {{- include "changelock.componentLabels" (dict "root" . "component" "audit-writer") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.auditWriter.service.port }}
      targetPort: http
---
{{- end }}
