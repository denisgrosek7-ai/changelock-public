{{- if .Values.deployGate.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "deploy-gate") }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
    app.kubernetes.io/component: deploy-gate
spec:
  selector:
    {{- include "changelock.componentLabels" (dict "root" . "component" "deploy-gate") | nindent 4 }}
  ports:
    - name: {{ if .Values.deployGate.tls.enabled }}https{{ else }}http{{ end }}
      port: {{ if .Values.deployGate.tls.enabled }}443{{ else }}{{ .Values.deployGate.service.port }}{{ end }}
      targetPort: {{ if .Values.deployGate.tls.enabled }}https{{ else }}http{{ end }}
---
{{- end }}
