{{- if .Values.auth.createSecret }}
{{- $internalToken := .Values.auth.internalServiceToken | default "" -}}
{{- if eq (trim $internalToken) "" -}}
{{- $internalToken = randAlphaNum 48 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "changelock.authSecretName" . }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.tokensJsonKey }}: {{ .Values.auth.tokensJson | quote }}
  {{ .Values.auth.internalServiceTokenKey }}: {{ $internalToken | quote }}
---
{{- end }}
{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "changelock.postgresSecretName" . }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  dsn: {{ printf "postgres://%s:%s@%s-postgresql:%d/%s?sslmode=disable" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "changelock.fullname" .) (int .Values.postgresql.service.port) .Values.postgresql.auth.database | quote }}
{{- end }}
