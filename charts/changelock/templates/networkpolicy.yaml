{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "changelock.fullname" . }}-default-deny
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "changelock.fullname" . }}-allow-internal
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
{{- if and .Values.deployGate.enabled .Values.deployGate.webhook.enabled .Values.networkPolicy.allowDeployGateWebhookIngress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "deploy-gate") }}-webhook-ingress
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "changelock.componentLabels" (dict "root" . "component" "deploy-gate") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8443
{{- end }}
{{- if and .Values.ui.enabled .Values.ui.ingress.enabled .Values.networkPolicy.allowUIIngress }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "ui") }}-ingress
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "changelock.componentLabels" (dict "root" . "component" "ui") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
{{- end }}
{{- end }}

