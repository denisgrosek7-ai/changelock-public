{{- if and .Values.auditWriter.enabled .Values.auditWriter.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "audit-writer") }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.auditWriter.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "changelock.componentLabels" (dict "root" . "component" "audit-writer") | nindent 6 }}
---
{{- end }}
