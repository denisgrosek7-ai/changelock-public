{{- end }}
{{- if .Values.runtimeAgent.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "changelock.serviceAccountName" (dict "root" . "component" "runtime-agent" "serviceAccount" .Values.runtimeAgent.serviceAccount) }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.runtimeAgent.serviceAccount.automountServiceAccountToken }}
{{- if .Values.ui.enabled }}
---
{{- end }}
{{- end }}
{{- if and .Values.ui.enabled .Values.ui.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "changelock.serviceAccountName" (dict "root" . "component" "ui" "serviceAccount" .Values.ui.serviceAccount) }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.ui.serviceAccount.automountServiceAccountToken }}
{{- end }}
