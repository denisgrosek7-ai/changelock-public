  labels:
    {{- include "changelock.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.attestationVerifier.serviceAccount.automountServiceAccountToken }}
---
{{- end }}
{{- if .Values.deployGate.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "changelock.serviceAccountName" (dict "root" . "component" "deploy-gate" "serviceAccount" .Values.deployGate.serviceAccount) }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.deployGate.serviceAccount.automountServiceAccountToken }}
