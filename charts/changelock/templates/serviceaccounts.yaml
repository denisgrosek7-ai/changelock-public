{{- if .Values.auditWriter.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "changelock.serviceAccountName" (dict "root" . "component" "audit-writer" "serviceAccount" .Values.auditWriter.serviceAccount) }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.auditWriter.serviceAccount.automountServiceAccountToken }}
---
{{- end }}
{{- if .Values.policyEngine.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "changelock.serviceAccountName" (dict "root" . "component" "policy-engine" "serviceAccount" .Values.policyEngine.serviceAccount) }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.policyEngine.serviceAccount.automountServiceAccountToken }}
---
{{- end }}
{{- if .Values.attestationVerifier.serviceAccount.create }}
apiVersion: v1
