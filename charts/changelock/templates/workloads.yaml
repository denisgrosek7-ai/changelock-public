{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "changelock.fullname" . }}-postgresql
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "changelock.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "changelock.componentLabels" (dict "root" . "component" "postgresql") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "changelock.componentLabels" (dict "root" . "component" "postgresql") | nindent 8 }}
    spec:
      securityContext:
        fsGroup: {{ .Values.postgresql.securityContext.fsGroup }}
      containers:
        - name: postgresql
          image: {{ include "changelock.image" (dict "image" .Values.postgresql.image) }}
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresql.service.port }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "changelock.postgresSecretName" . }}
                  key: postgres-password
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
---
{{- end }}
{{- if .Values.auditWriter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "audit-writer") }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
    app.kubernetes.io/component: audit-writer
spec:
  replicas: {{ .Values.auditWriter.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "changelock.componentLabels" (dict "root" . "component" "audit-writer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "changelock.componentLabels" (dict "root" . "component" "audit-writer") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "changelock.serviceAccountName" (dict "root" . "component" "audit-writer" "serviceAccount" .Values.auditWriter.serviceAccount) }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auditWriter.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- $affinity := include "changelock.affinity" (dict "root" . "component" "audit-writer" "mode" .Values.auditWriter.antiAffinity) }}
      {{- if $affinity }}
      affinity:
{{ $affinity | nindent 8 }}
      {{- end }}
      {{- with .Values.auditWriter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.auditWriter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: audit-writer
          image: {{ include "changelock.image" (dict "image" .Values.auditWriter.image) }}
          imagePullPolicy: {{ .Values.auditWriter.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.auditWriter.service.port }}
          env:
            - name: PORT
              value: {{ .Values.auditWriter.service.port | quote }}
            - name: CHANGELOCK_AUDIT_STORE
              value: postgres
            - name: CHANGELOCK_POSTGRES_DSN
              {{- if .Values.externalPostgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgresql.existingSecret }}
                  key: {{ .Values.externalPostgresql.dsnKey }}
              {{- else if .Values.externalPostgresql.dsn }}
              value: {{ .Values.externalPostgresql.dsn | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "changelock.postgresSecretName" . }}
                  key: dsn
              {{- end }}
            - name: CHANGELOCK_AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            {{- if or .Values.auth.existingSecret .Values.auth.createSecret }}
            - name: CHANGELOCK_AUTH_TOKENS_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ include "changelock.authSecretName" . }}
                  key: {{ .Values.auth.tokensJsonKey }}
            {{- end }}
            - name: CHANGELOCK_AUTH_ROLE_CLAIM
              value: {{ .Values.auth.roleClaim | quote }}
            - name: CHANGELOCK_AUTH_TENANT_CLAIM
              value: {{ .Values.auth.tenantClaim | quote }}
            - name: CHANGELOCK_AUTH_EMAIL_CLAIM
              value: {{ .Values.auth.emailClaim | quote }}
            - name: CHANGELOCK_AUTH_SUBJECT_CLAIM
              value: {{ .Values.auth.subjectClaim | quote }}
            - name: CHANGELOCK_AUTH_REQUIRE_TENANT_SCOPE
              value: {{ .Values.auth.requireTenantScope | quote }}
            - name: CHANGELOCK_AUTH_ALLOW_GLOBAL_SECURITY_ADMIN
              value: {{ .Values.auth.allowGlobalSecurityAdmin | quote }}
            {{- if .Values.auth.roleBindingsJson }}
            - name: CHANGELOCK_AUTH_ROLE_BINDINGS_JSON
              value: {{ .Values.auth.roleBindingsJson | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.issuer }}
            - name: CHANGELOCK_OIDC_ISSUER
              value: {{ .Values.auth.oidc.issuer | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.audiences }}
            - name: CHANGELOCK_OIDC_AUDIENCES
              value: {{ .Values.auth.oidc.audiences | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.jwksUrl }}
            - name: CHANGELOCK_OIDC_JWKS_URL
              value: {{ .Values.auth.oidc.jwksUrl | quote }}
            {{- end }}
            - name: CHANGELOCK_OIDC_CLOCK_SKEW
              value: {{ .Values.auth.oidc.clockSkew | quote }}
            {{- range $name, $value := .Values.auditWriter.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.auditWriter.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
{{- end }}
