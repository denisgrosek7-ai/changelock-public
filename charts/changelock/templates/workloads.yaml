{{- if .Values.deployGate.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "changelock.componentFullname" (dict "root" . "component" "deploy-gate") }}
  labels:
    {{- include "changelock.labels" . | nindent 4 }}
    app.kubernetes.io/component: deploy-gate
spec:
  replicas: {{ .Values.deployGate.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "changelock.componentLabels" (dict "root" . "component" "deploy-gate") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "changelock.componentLabels" (dict "root" . "component" "deploy-gate") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "changelock.serviceAccountName" (dict "root" . "component" "deploy-gate" "serviceAccount" .Values.deployGate.serviceAccount) }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployGate.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- $affinity := include "changelock.affinity" (dict "root" . "component" "deploy-gate" "mode" .Values.deployGate.antiAffinity) }}
      {{- if $affinity }}
      affinity:
{{ $affinity | nindent 8 }}
      {{- end }}
      {{- with .Values.deployGate.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployGate.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: policies-global
          configMap:
            name: {{ include "changelock.fullname" . }}-policies-global
        - name: policies-acme
          configMap:
            name: {{ include "changelock.fullname" . }}-policies-acme
        {{- if .Values.deployGate.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ required "deployGate.tls.secretName is required when deployGate.tls.enabled=true" .Values.deployGate.tls.secretName }}
        {{- end }}
      containers:
        - name: deploy-gate
          image: {{ include "changelock.image" (dict "image" .Values.deployGate.image) }}
          imagePullPolicy: {{ .Values.deployGate.image.pullPolicy }}
          ports:
            - name: {{ if .Values.deployGate.tls.enabled }}https{{ else }}http{{ end }}
              containerPort: {{ if .Values.deployGate.tls.enabled }}8443{{ else }}{{ .Values.deployGate.service.port }}{{ end }}
          env:
            - name: PORT
              value: {{ if .Values.deployGate.tls.enabled }}"8443"{{ else }}{{ .Values.deployGate.service.port | quote }}{{ end }}
            - name: CHANGELOCK_POLICIES_DIR
              value: /etc/changelock/policies
            - name: AUDIT_WRITER_URL
              value: http://{{ include "changelock.componentFullname" (dict "root" . "component" "audit-writer") }}:{{ .Values.auditWriter.service.port }}
            {{- if or .Values.auth.existingSecret .Values.auth.createSecret }}
            - name: CHANGELOCK_INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "changelock.authSecretName" . }}
                  key: {{ .Values.auth.internalServiceTokenKey }}
            {{- end }}
            {{- if .Values.deployGate.tls.enabled }}
            - name: TLS_CERT_FILE
              value: /etc/changelock/tls/tls.crt
            - name: TLS_KEY_FILE
              value: /etc/changelock/tls/tls.key
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ if .Values.deployGate.tls.enabled }}https{{ else }}http{{ end }}
              scheme: {{ if .Values.deployGate.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ if .Values.deployGate.tls.enabled }}https{{ else }}http{{ end }}
              scheme: {{ if .Values.deployGate.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.deployGate.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: policies-global
              mountPath: /etc/changelock/policies/global
              readOnly: true
            - name: policies-acme
              mountPath: /etc/changelock/policies/tenants/acme
              readOnly: true
            {{- if .Values.deployGate.tls.enabled }}
            - name: tls
              mountPath: /etc/changelock/tls
              readOnly: true
            {{- end }}
---
{{- end }}
