# Production baseline example.
# Do not use demo tokens or docker-compose.dev.yml defaults with this file.
deploymentProfile: production

auth:
  mode: oidc-jwt
  createSecret: false
  # Secret must provide CHANGELOCK_INTERNAL_SERVICE_TOKEN.
  existingSecret: changelock-auth
  roleClaim: groups
  tenantClaim: tenant_id
  emailClaim: email
  subjectClaim: sub
  requireTenantScope: true
  allowGlobalSecurityAdmin: true
  roleBindingsJson: '{"viewer":["changelock-viewers"],"operator":["changelock-operators"],"security_admin":["changelock-security-admins"],"service_internal":["changelock-services"]}'
  oidc:
    issuer: https://issuer.example.com
    audiences: changelock-ui
    jwksUrl: https://issuer.example.com/.well-known/jwks.json
    clockSkew: 1m

sync:
  mode: hub
  requireClusterId: true
  failMode: last-known-good
  pollInterval: 30s
  cacheDir: /var/lib/changelock-sync
  # Secret must provide CHANGELOCK_SYNC_CLUSTER_BINDINGS_JSON for hub mode.
  clusterBindingsExistingSecret: changelock-sync
  clusterBindingsKey: CHANGELOCK_SYNC_CLUSTER_BINDINGS_JSON
  # Spoke example:
  # mode: spoke
  # clusterId: prod-eu
  # hubUrl: https://changelock-hub.example.com
  # tokenExistingSecret: changelock-sync
  # tokenKey: CHANGELOCK_SYNC_TOKEN

signer:
  mode: vault-transit
  purposes: exceptions,sync-snapshots
  keyId: changelock-control-plane
  algorithm: sha2-256
  verifyOnRead: true
  # Secret must provide CHANGELOCK_VAULT_TOKEN.
  existingSecret: changelock-signer
  vault:
    addr: https://vault.example.com
    transitPath: transit
    transitKey: changelock-control-plane

postgresql:
  enabled: false

externalPostgresql:
  existingSecret: changelock-postgres

auditWriter:
  replicaCount: 2
  antiAffinity: required
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    CHANGELOCK_REPORTS_TIMEOUT: 5s
    CHANGELOCK_SBOM_INGEST_ENABLED: "true"
    CHANGELOCK_VULNOPS_ENABLED: "true"
    CHANGELOCK_VULNOPS_SCAN_INTERVAL: 6h
    CHANGELOCK_VULNOPS_SCANNER: trivy
    CHANGELOCK_VULNOPS_TRIVY_PATH: trivy
    CHANGELOCK_VULNOPS_GRYPE_PATH: grype
    CHANGELOCK_CORS_ALLOW_ORIGINS: https://changelock.example.com

policyEngine:
  replicaCount: 2
  antiAffinity: required
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

attestationVerifier:
  replicaCount: 2
  antiAffinity: soft
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

deployGate:
  replicaCount: 3
  antiAffinity: required
  # Optional: set to enforce once VEX-aware vulnerability evaluation is part of the admission posture.
  vexDeployMode: disabled
  tls:
    enabled: true
    secretName: changelock-deploy-gate-tls
  webhook:
    enabled: true
    caBundle: REPLACE_WITH_BASE64_CA_BUNDLE
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  service:
    port: 443
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

runtimeAgent:
  replicaCount: 1
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ui:
  enabled: false

networkPolicy:
  enabled: true
