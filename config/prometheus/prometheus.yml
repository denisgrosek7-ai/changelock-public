global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: changelock-audit-writer
    static_configs:
      - targets: ["audit-writer:8094"]

  - job_name: changelock-policy-engine
    static_configs:
      - targets: ["policy-engine:8090"]

  - job_name: changelock-attestation-verifier
    static_configs:
      - targets: ["attestation-verifier:8091"]

  - job_name: changelock-deploy-gate
    static_configs:
      - targets: ["deploy-gate:8092"]

  - job_name: changelock-runtime-agent
    static_configs:
      - targets: ["runtime-agent:8093"]
