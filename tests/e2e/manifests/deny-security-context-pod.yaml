apiVersion: v1
kind: Pod
metadata:
  name: changelock-deny-security-context
  namespace: acme-prod
  annotations:
    changelock.io/tenant: acme
    changelock.io/repository: my-org/acme-app
    changelock.io/subject: repo:my-org/acme-app
    changelock.io/workflow-ref: refs/heads/main
    changelock.io/workflow-sha: abc123
spec:
  serviceAccountName: changelock-demo
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: ghcr.io/my-org/acme-app@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
