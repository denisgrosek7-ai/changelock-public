apiVersion: v1
kind: ServiceAccount
metadata:
  name: changelock-runtime-agent
  namespace: changelock-system
automountServiceAccountToken: true
---
# Reference RBAC for mutation-enabled runtime closed loop.
# Trim or split write privileges if you are running read-only drift detection only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: changelock-runtime-agent-read
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: changelock-runtime-agent-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: changelock-runtime-agent-read
subjects:
  - kind: ServiceAccount
    name: changelock-runtime-agent
    namespace: changelock-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: changelock-runtime-agent-write
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: changelock-runtime-agent-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: changelock-runtime-agent-write
subjects:
  - kind: ServiceAccount
    name: changelock-runtime-agent
    namespace: changelock-system
