apiVersion: apps/v1
kind: Deployment
metadata:
  name: changelock-api
  namespace: changelock-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: changelock-api
  template:
    metadata:
      labels:
        app: changelock-api
    spec:
      serviceAccountName: changelock-api
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/my-org/changelock-api@sha256:REPLACE_ME
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
