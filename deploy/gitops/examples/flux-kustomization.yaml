apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: changelock-policies
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/example/changelock-blueprint.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: changelock-policies-prod-eu
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: changelock-policies
  path: ./deploy/gitops/policies/overlays/prod-eu
  targetNamespace: changelock-system
